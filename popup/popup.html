<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decova</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">
      <header class="header">
        <div class="logo">
          <span class="logo-icon">✦</span>
          <span class="logo-text">Decova</span>
        </div>
        <button class="icon-btn" id="open-dashboard" title="Open Dashboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
          </svg>
        </button>
      </header>

      <div class="status-bar" id="status-bar">
        <span class="status-dot idle"></span>
        <span class="status-text" id="status-text">Ready to capture</span>
      </div>

      <div class="main">
        <button class="capture-btn" id="capture-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M9 2h6l2 3h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h3z"/>
          </svg>
          <span id="capture-label">Start Capturing</span>
        </button>

        <div class="recent-section">
          <div class="section-header">
            <span class="section-title">Recent Saves</span>
            <span class="section-count" id="save-count">0</span>
          </div>
          <div class="recent-list" id="recent-list">
            <div class="empty-state">
              <span>No captures yet</span>
              <span class="empty-sub">Click an element on any page to start</span>
            </div>
          </div>
        </div>
      </div>

      <footer class="footer">
        <button class="footer-link" id="open-dashboard-footer">Open Dashboard →</button>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
